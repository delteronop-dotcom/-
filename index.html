<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ecos Eternos: Angeles 💌</title>
    <style>
        body, html { margin: 0; overflow: hidden; background: #050505; font-family: 'serif'; touch-action: none; }
        #ui-layer { position: absolute; width: 100%; height: 100%; z-index: 10; pointer-events: none; color: white; }
        
        #intro-screen { 
            position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, #2a0a2e, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; pointer-events: auto; z-index: 20;
        }

        #hud { position: absolute; top: 20px; width: 100%; text-align: center; opacity: 0; transition: 1s; }
        #objective { font-size: 1.2em; color: #ff3366; text-shadow: 0 0 10px #fff; font-weight: bold; }
        #guide-msg { font-size: 0.8em; color: #aaa; margin-top: 5px; }

        #controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-around; align-items: center; pointer-events: auto; opacity: 0; }
        #joystick-base { width: 100px; height: 100px; background: rgba(255,255,255,0.05); border: 2px solid #ff3366; border-radius: 50%; position: relative; }
        #joystick-stick { width: 40px; height: 40px; background: #ff3366; border-radius: 50%; position: absolute; top: 30px; left: 30px; box-shadow: 0 0 15px #ff3366; }
        
        #action-btn { width: 70px; height: 70px; border-radius: 50%; background: white; border: none; font-weight: bold; box-shadow: 0 0 20px #fff; }
        
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="intro-screen">
            <h1 style="letter-spacing: 5px;">ECOS ETERNOS</h1>
            <p>Un viaje por el alma de Angeles</p>
            <button id="start-btn" style="padding: 15px 40px; background: #ff3366; color: white; border: none; border-radius: 30px; font-weight: bold;">INICIAR</button>
        </div>

        <div id="hud">
            <div id="objective">Diamantes: 0 / 5</div>
            <div id="guide-msg">Sigue la línea dorada...</div>
        </div>

        <div id="controls">
            <div id="joystick-base"><div id="joystick-stick"></div></div>
            <button id="action-btn">PULSO</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, heart, flames = [], score = 0;
        let moveX = 0, moveY = 0;
        let guideLine;
        const speed = 0.28;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0a0510, 0.03);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // Estrellas de fondo
            const starGeo = new THREE.BufferGeometry();
            const starCoords = [];
            for(let i=0; i<1000; i++) {
                starCoords.push((Math.random()-0.5)*200, (Math.random()-0.5)*200, -50);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x555555, size: 0.1 })));

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const pLight = new THREE.PointLight(0xff3366, 30, 100);
            pLight.position.set(0, 0, 10);
            scene.add(pLight);

            // CORAZÓN
            const heartShape = new THREE.Shape();
            heartShape.moveTo( 0, 10 );
            heartShape.bezierCurveTo( 10, 20, 20, 10, 20, 0 );
            heartShape.bezierCurveTo( 20, -10, 10, -18, 0, -28 );
            heartShape.bezierCurveTo( -10, -18, -20, -10, -20, 0 );
            heartShape.bezierCurveTo( -20, 10, -10, 20, 0, 10 );

            const heartGeo = new THREE.ExtrudeGeometry(heartShape, { depth: 4, bevelEnabled: true, bevelSize: 1, bevelThickness: 1 });
            heart = new THREE.Mesh(heartGeo, new THREE.MeshPhongMaterial({ color: 0xff1144, emissive: 0x440011 }));
            heart.scale.set(0.04, 0.04, 0.04);
            heart.rotation.x = Math.PI; 
            heart.rotation.z = Math.PI;
            heart.position.z = 0; // Posición base Z = 0
            scene.add(heart);

            // Guía
            guideLine = new THREE.Line(
                new THREE.BufferGeometry(),
                new THREE.LineBasicMaterial({ color: 0xffcc00, transparent: true, opacity: 0.5 })
            );
            scene.add(guideLine);

            spawnFlames();
            setupMobileControls();
            animate();
        }

        function spawnFlames() {
            for(let i=0; i<5; i++) {
                const flame = new THREE.Mesh(
                    new THREE.OctahedronGeometry(0.8, 0),
                    new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 1 })
                );
                // CORRECCIÓN: Todos en Z = 0 para que el choque sea perfecto
                flame.position.set(
                    (Math.random()-0.5)*40, 
                    (Math.random()-0.5)*40, 
                    0 
                );
                scene.add(flame);
                flames.push(flame);
            }
        }

        function setupMobileControls() {
            const base = document.getElementById('joystick-base');
            const stick = document.getElementById('joystick-stick');

            const handleTouch = (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = base.getBoundingClientRect();
                const centerX = rect.left + rect.width/2;
                const centerY = rect.top + rect.height/2;
                moveX = Math.min(Math.max((touch.clientX - centerX)/40, -1), 1);
                moveY = Math.min(Math.max((touch.clientY - centerY)/40, -1), 1);
                stick.style.transform = `translate(${moveX*30}px, ${moveY*30}px)`;
            };

            base.addEventListener('touchmove', handleTouch, { passive: false });
            base.addEventListener('touchend', () => {
                moveX = 0; moveY = 0;
                stick.style.transform = `translate(0,0)`;
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if(heart) {
                heart.position.x += moveX * speed;
                heart.position.y -= moveY * speed;
                heart.rotation.y += 0.02;
                camera.position.lerp(new THREE.Vector3(heart.position.x, heart.position.y, 20), 0.1);
            }

            if(flames.length > 0) {
                let closest = flames[0];
                flames.forEach(f => {
                    if(heart.position.distanceTo(f.position) < heart.position.distanceTo(closest.position)) closest = f;
                });
                guideLine.geometry.setFromPoints([heart.position, closest.position]);
                guideLine.visible = true;
            } else {
                guideLine.visible = false;
            }

            for(let i = flames.length - 1; i >= 0; i--) {
                const f = flames[i];
                f.rotation.y += 0.05;
                // Colisión mejorada: Ahora siempre están en el mismo plano
                if(heart.position.distanceTo(f.position) < 2) {
                    scene.remove(f);
                    flames.splice(i, 1);
                    score++;
                    if(navigator.vibrate) navigator.vibrate(100);
                    document.getElementById('objective').innerText = `Diamantes: ${score} / 5`;
                    if(score >= 5) document.getElementById('objective').innerText = "¡REINO 1 SUPERADO! ❤️";
                }
            }
            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('hud').style.opacity = '1';
            document.getElementById('controls').style.opacity = '1';
            init();
        });
    </script>
</body>
</html>
